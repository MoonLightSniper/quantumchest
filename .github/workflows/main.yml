name: Build QuantumChest

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'
        cache: maven

    - name: Build with Maven
      run: mvn package -B
      working-directory: QuantumChest

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: QuantumChest
        path: QuantumChest/target/QuantumChest-1.0.0.jar
